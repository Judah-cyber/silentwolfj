# fly.toml — Silent WolfBot deployment configuration for Fly.io
# Docs: https://fly.io/docs/reference/configuration/
#
# SETUP STEPS:
#   1. Install flyctl: https://fly.io/docs/hands-on/install-flyctl/
#   2. Login: fly auth login
#   3. Launch (first time only): fly launch --no-deploy
#      - When prompted, say YES to use this fly.toml
#      - Say NO to creating a PostgreSQL database (bot uses SQLite)
#   4. Create persistent volumes:
#        fly vol create wolfbot_data    --size 1 --region <your-region>
#        fly vol create wolfbot_session --size 1 --region <your-region>
#   5. Set required secrets:
#        fly secrets set SESSION_ID="<your-session-id-string>"
#        fly secrets set OWNER_NUMBER="<your-number-with-country-code>"
#        fly secrets set BOT_NAME="Silent Wolf"
#        fly secrets set PREFIX="?"
#        fly secrets set SUDO_NUMBERS=""
#        fly secrets set DATABASE_URL=""    # optional: PostgreSQL URL for cross-restart backup
#   6. Deploy: fly deploy

app            = 'silent-wolf-bot'
primary_region = 'lad'
kill_signal    = 'SIGINT'
kill_timeout   = '30s'

[build]

[env]
  NODE_ENV = 'production'
  PORT     = '3000'

[http_service]
  internal_port        = 3000
  force_https          = true
  auto_stop_machines   = 'off'
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ['app']

  [http_service.concurrency]
    type       = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory   = '1gb'
  cpu_kind = 'shared'
  cpus     = 1

[[mounts]]
  source     = 'wolfbot_data'
  destination = '/app/data'
  initial_size = '1gb'
  auto_extend_size_threshold  = 80
  auto_extend_size_increment  = '1gb'
  auto_extend_size_limit      = '10gb'

[[mounts]]
  source      = 'wolfbot_session'
  destination = '/app/session'
  initial_size = '512mb'
